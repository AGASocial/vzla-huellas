# fly.toml app configuration file generated for reencuentro-afis-matcher on 2026-06-28T09:48:44-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'reencuentro-afis-matcher'
primary_region = 'dfw'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # En 0 las 2 máquinas se apagan sin tráfico y el primer request paga el
  # cold start de la JVM (varios segundos) — riesgoso bajo un pico de
  # lanzamiento. En 2 quedan las dos siempre prendidas, sin cold start,
  # repartiendo carga entre ambas.
  min_machines_running = 2

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
